services:
  mysql:
    image: mysql:8.0
    container_name: figurex_mysql_prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: figurex
      MYSQL_USER: figurex
      MYSQL_PASSWORD: figurex
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - figurex_mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pfigurex"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: figurex_app_prod
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: figurex_scheduler_prod
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: php artisan schedule:work

  nginx:
    image: nginx:1.27-alpine
    container_name: figurex_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./dist:/var/www/frontend:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  figurex_mysql_prod_data:
